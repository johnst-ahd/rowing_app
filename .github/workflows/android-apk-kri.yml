# Build KRI GPS Android APK and publish a stable download link.
name: Android APK (KRI GPS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'KRI GPS/**'
      - 'apps/kri-native/**'
      - 'apps/recorder-pwa/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk-kri.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android platform
        working-directory: apps/kri-native
        run: |
          if [ ! -f android/gradlew ]; then npx cap add android; fi

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Sync brand assets + build web
        run: |
          node scripts/sync-brand-assets.mjs
          node scripts/generate-launcher-icon.mjs "KRI GPS/public/assets/kri/kri-logo.png" apps/kri-native/assets/icon-source.png --bg=white --scale=0.75
          node scripts/smoke-kri-build.mjs
          node scripts/apply-android-launcher-icon.mjs apps/kri-native/android/app apps/kri-native/assets/icon-source.png
          cd apps/kri-native && npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/kri-native/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset (arm64)
        run: |
          APK_DIR=apps/kri-native/android/app/build/outputs/apk/debug
          if [ -f "$APK_DIR/app-arm64-v8a-debug.apk" ]; then
            cp "$APK_DIR/app-arm64-v8a-debug.apk" KRI-GPS.apk
          else
            cp "$APK_DIR/app-debug.apk" KRI-GPS.apk
          fi
          ls -lh KRI-GPS.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KRI-GPS-debug-apk
          path: KRI-GPS.apk
          retention-days: 90

      - name: Publish GitHub Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-kri-latest
          target_commitish: ${{ github.sha }}
          name: KRI GPS — Android APK
          body: |
            KRI Safety System — GPS + capsize only (no heart rate / stroke rate).

            1. Download **KRI-GPS.apk** below
            2. Open on phone → Install (allow unknown apps if asked)
            3. Battery → Unrestricted; Location → Allow all the time; Notifications on
            4. App Settings → Device ID → Start session (GPS + Accelerometer on)

            Ingest: https://rowing-app-recorder-pwa.vercel.app/api/ingest
          prerelease: true
          make_latest: false
          files: KRI-GPS.apk
