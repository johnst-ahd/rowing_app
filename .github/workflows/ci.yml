# Build PWA + API bundle on every push (catches Vercel failures early).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vercel build (monorepo)
        run: npm run build

      - name: KRI native web smoke build
        run: npm run test:kri

      - name: Verify API modules load
        run: node -e "require('./apps/recorder-pwa/api/history.js'); require('./apps/recorder-pwa/api/ingest.js'); console.log('api ok')"
