# Build CrewSight Manager Android APK and publish a stable download link.
name: Android APK (CrewSight Manager)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/coach-pwa/**'
      - 'apps/coach-native/**'
      - 'packages/vite-plugins/**'
      - 'assets/crewsight/**'
      - 'scripts/sync-brand-assets.mjs'
      - 'scripts/generate-crewsight-manager-icon.mjs'
      - 'scripts/generate-launcher-icon.mjs'
      - 'scripts/apply-android-launcher-icon.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk-coach.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android platform
        working-directory: apps/coach-native
        run: |
          if [ ! -f android/gradlew ]; then npx cap add android; fi

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Sync brand assets + build web
        run: |
          node scripts/sync-brand-assets.mjs
          node scripts/generate-launcher-icon.mjs apps/coach-pwa/public/assets/crewsight/crewsight-logo-icon-only-manager-color.png apps/coach-native/assets/icon-source.png --bg=black --scale=1.0
          npm run build:coach:native
          node scripts/apply-android-launcher-icon.mjs apps/coach-native/android/app apps/coach-native/assets/icon-source.png
          cd apps/coach-native && npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/coach-native/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset (arm64)
        run: |
          APK_DIR=apps/coach-native/android/app/build/outputs/apk/debug
          if [ -f "$APK_DIR/app-arm64-v8a-debug.apk" ]; then
            cp "$APK_DIR/app-arm64-v8a-debug.apk" CrewSight-Manager.apk
          else
            cp "$APK_DIR/app-debug.apk" CrewSight-Manager.apk
          fi
          ls -lh CrewSight-Manager.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrewSight-Manager-debug-apk
          path: CrewSight-Manager.apk
          retention-days: 90

      - name: Publish GitHub Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-manager-latest
          target_commitish: ${{ github.sha }}
          name: CrewSight Manager — Android APK
          body: |
            Native CrewSight Manager — live map, history, and background capsize alerts.

            1. Download **CrewSight-Manager.apk** below
            2. Open on phone → Install (allow unknown apps if asked)
            3. Allow **Notifications**
            4. Settings → API URL + ingest token (same as web dashboard)
            5. Tap **Start monitoring** before the session; **Stop monitoring** when finished

            Background capsize alerts only run while monitoring is ON.

            Web dashboard: https://rowing-app-recorder-pwa.vercel.app/dashboard
          prerelease: true
          make_latest: false
          files: CrewSight-Manager.apk
