# Build a sideloadable Android APK and publish a stable download link.
name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/recorder-pwa/**'
      - 'apps/recorder-native/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android platform
        working-directory: apps/recorder-native
        run: |
          if [ ! -f android/gradlew ]; then npx cap add android; fi

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Sync brand assets + build web
        run: |
          node scripts/sync-brand-assets.mjs
          node scripts/generate-launcher-icon.mjs apps/recorder-pwa/public/assets/crewsight/crewsight-logo-icon-only-color.png apps/recorder-native/assets/icon-source.png --bg=black --scale=0.82
          npm run build:native -w recorder-pwa
          node scripts/apply-android-launcher-icon.mjs apps/recorder-native/android/app apps/recorder-native/assets/icon-source.png
          cd apps/recorder-native && npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/recorder-native/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset (arm64 — smaller download for phones)
        run: |
          APK_DIR=apps/recorder-native/android/app/build/outputs/apk/debug
          if [ -f "$APK_DIR/app-arm64-v8a-debug.apk" ]; then
            cp "$APK_DIR/app-arm64-v8a-debug.apk" CrewSight.apk
          else
            cp "$APK_DIR/app-debug.apk" CrewSight.apk
          fi
          ls -lh CrewSight.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrewSight-debug-apk
          path: CrewSight.apk
          retention-days: 90

      - name: Publish GitHub Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-latest
          target_commitish: ${{ github.sha }}
          name: CrewSight — Android APK
          body: |
            Sideload this APK on Samsung / Android (no Play Store).

            1. Download **CrewSight.apk** below
            2. Open on phone → Install (allow unknown apps if asked)
            3. Battery → Unrestricted; Location → Allow all the time
            4. App Settings → Device ID → Start session

            Ingest: https://rowing-app-recorder-pwa.vercel.app/api/ingest
          prerelease: true
          make_latest: false
          files: CrewSight.apk
