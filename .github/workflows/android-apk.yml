# Build a sideloadable Android APK and publish a stable download link.
name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/recorder-pwa/**'
      - 'apps/recorder-native/**'
      - 'packages/**'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android platform
        working-directory: apps/recorder-native
        run: |
          if [ ! -d android ]; then npx cap add android; fi

      - name: Build web + sync
        run: |
          npm run build:native -w recorder-pwa
          cd apps/recorder-native && npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/recorder-native/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset
        run: |
          cp apps/recorder-native/android/app/build/outputs/apk/debug/app-debug.apk RNZ-Row-Recorder.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNZ-Row-Recorder-debug-apk
          path: RNZ-Row-Recorder.apk
          retention-days: 90

      - name: Publish GitHub Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-latest
          target_commitish: ${{ github.sha }}
          name: RNZ Row Recorder — Android APK
          body: |
            Sideload this APK on Samsung / Android (no Play Store).

            1. Download **RNZ-Row-Recorder.apk** below
            2. Open on phone → Install (allow unknown apps if asked)
            3. Battery → Unrestricted; Location → Allow all the time
            4. App Settings → Device ID → Start session

            Ingest: https://rowing-app-recorder-pwa.vercel.app/api/ingest
          prerelease: true
          make_latest: false
          files: RNZ-Row-Recorder.apk
