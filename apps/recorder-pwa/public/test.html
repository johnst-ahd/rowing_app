<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection test · Altitude HD</title>
    <link rel="stylesheet" href="/ahd-hub-theme.css" />
    <style>
      .test-wrap { max-width: 520px; margin: 0 auto; }
      .test-wrap label { display: block; margin-bottom: 0.75rem; font-size: 13px; font-weight: 600; color: var(--ahd-muted); }
      .test-wrap input { width: 100%; margin-top: 0.35rem; }
      .test-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
      pre { background: rgba(6, 20, 38, 0.65); border: 1px solid var(--ahd-border); padding: 0.75rem; border-radius: 8px; font-size: 0.75rem; overflow: auto; white-space: pre-wrap; }
    </style>
  </head>
  <body class="hub-page">
    <header class="hub-topbar">
      <div class="hub-topbar-inner">
        <div class="hub-topbar-brands">
          <img src="/altitude-hd-logo.png" alt="Altitude HD" class="hub-logo" width="260" height="98" />
        </div>
        <p class="hub-tagline">API connection test</p>
      </div>
    </header>
    <div class="ahd-app-wrap ahd-app-wrap--narrow test-wrap">
    <h1 class="hub-section-title">Connection test</h1>
    <p>Run these on the same phone/browser you use for recording.</p>

    <label>Ingest token (if set in Vercel)</label>
    <input type="password" id="token" />

    <label>Device ID</label>
    <input id="deviceId" value="TEST-PHONE-01" />

    <div class="test-btns">
      <button type="button" class="hub-btn" id="btnPing">1. Ping API</button>
      <button type="button" class="hub-btn" id="btnIngest">2. Test ingest</button>
      <button type="button" class="hub-btn" id="btnDevices">3. List devices</button>
      <button type="button" class="hub-btn" id="btnPositions">4. GPS positions</button>
    </div>

    <p class="hint"><a href="/">Recorder</a> · <a href="/dashboard.html">Dashboard</a> · <a href="https://traccar-overlay.vercel.app/">Hub</a></p>
    <pre id="out">Tap a test button…</pre>
    </div>
    <footer class="ahd-footer">Altitude HD · RNZ Row Recorder</footer>

    <script>
      const out = document.getElementById('out');
      const log = (msg) => {
        out.textContent = msg;
      };

      function headers() {
        const h = { 'Content-Type': 'application/json', Accept: 'application/json' };
        const t = document.getElementById('token').value.trim();
        if (t) h.Authorization = 'Bearer ' + t;
        return h;
      }

      document.getElementById('btnPing').onclick = async () => {
        try {
          const r = await fetch('/api/ping');
          log(await r.text());
        } catch (e) {
          log('Ping failed: ' + e.message);
        }
      };

      document.getElementById('btnIngest').onclick = async () => {
        const deviceId = document.getElementById('deviceId').value.trim();
        const body = {
          sessionId: 'test-' + Date.now(),
          deviceId,
          samples: [
            {
              t: Date.now(),
              gps: { lat: -36.8485, lon: 174.7633, acc: 10 },
              hr: { bpm: 80 },
              motion: { ax: 0, ay: 0, az: 9.8 },
            },
          ],
        };
        try {
          const r = await fetch('/api/ingest', {
            method: 'POST',
            headers: headers(),
            body: JSON.stringify(body),
          });
          log('Ingest ' + r.status + '\n' + (await r.text()));
        } catch (e) {
          log('Ingest failed: ' + e.message);
        }
      };

      document.getElementById('btnDevices').onclick = async () => {
        try {
          const r = await fetch('/api/devices', { headers: headers() });
          log('Devices ' + r.status + '\n' + (await r.text()));
        } catch (e) {
          log('Devices failed: ' + e.message);
        }
      };

      document.getElementById('btnPositions').onclick = async () => {
        try {
          const r = await fetch('/api/positions', { headers: headers() });
          log('Positions ' + r.status + '\n' + (await r.text()));
        } catch (e) {
          log('Positions failed: ' + e.message);
        }
      };
    </script>
  </body>
</html>
